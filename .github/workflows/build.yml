name: Build & Release

on:
  push:
    tags: [ 'v*' ]
    branches: [ main ]
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-test:
    name: Build & Test
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        run: |
          if [ -d "/Applications/Xcode_26.2.app" ]; then
            XCODE_PATH="/Applications/Xcode_26.2.app"
          elif [ -d "/Applications/Xcode_26.2.0.app" ]; then
            XCODE_PATH="/Applications/Xcode_26.2.0.app"
          else
            XCODE_PATH=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -rV | head -1)
          fi
          echo "Selected Xcode: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"
          xcodebuild -version

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Build tests
        run: dotnet build PolyPilot.Tests --configuration Release

      - name: Run tests
        run: |
          dotnet test PolyPilot.Tests \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: '**/TestResults/*.trx'
          retention-days: 7

  publish-maccatalyst:
    name: Publish Mac Catalyst App
    runs-on: macos-26
    needs: build-test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      statuses: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        run: |
          ls -d /Applications/Xcode*.app 2>/dev/null
          if [ -d "/Applications/Xcode_26.2.app" ]; then
            XCODE_PATH="/Applications/Xcode_26.2.app"
          elif [ -d "/Applications/Xcode_26.2.0.app" ]; then
            XCODE_PATH="/Applications/Xcode_26.2.0.app"
          else
            XCODE_PATH=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -rV | head -1)
          fi
          echo "Selected Xcode: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"
          sudo xcodebuild -license accept 2>/dev/null || true
          xcodebuild -version
          echo "MD_APPLE_SDK_ROOT=$XCODE_PATH" >> $GITHUB_ENV

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Import signing certificate and provisioning profile
        if: env.APPLE_CERTIFICATE_P12 != ''
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Install provisioning profile (.provisionprofile for Mac Catalyst/macOS)
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          printenv APPLE_PROVISIONING_PROFILE | openssl base64 -d -A > $RUNNER_TEMP/profile.provisionprofile
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i $RUNNER_TEMP/profile.provisionprofile))
          cp $RUNNER_TEMP/profile.provisionprofile ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.provisionprofile
          echo "Installed profile with UUID: $PROFILE_UUID"

          # Create keychain and import certificate
          printenv APPLE_CERTIFICATE_P12 | openssl base64 -d -A > $RUNNER_TEMP/certificate.p12
          if [ ! -s $RUNNER_TEMP/certificate.p12 ]; then
            echo "::error::Failed to decode APPLE_CERTIFICATE_P12 — check that the secret is valid base64"
            exit 1
          fi
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $RUNNER_TEMP/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          echo "Certificate and profile setup complete."

      - name: Determine version
        id: version
        run: |
          SHA="${GITHUB_SHA::8}"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VER="${GITHUB_REF#refs/tags/v}"
          else
            VER="1.0"
          fi
          echo "app_version=$VER" >> $GITHUB_OUTPUT
          echo "commit_sha=$SHA" >> $GITHUB_OUTPUT
          echo "Version: $VER+$SHA"

      - name: Publish Mac Catalyst App (Signed)
        if: env.APPLE_CERTIFICATE_P12 != ''
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
          APPLE_PROVISIONING_PROFILE_NAME: ${{ secrets.APPLE_PROVISIONING_PROFILE_NAME }}
        run: |
          dotnet publish PolyPilot/PolyPilot.csproj \
            -f net10.0-maccatalyst \
            -c Release \
            -p:CreatePackage=false \
            -p:EnableCodeSigning=true \
            -p:CodesignKey="$APPLE_CODESIGN_IDENTITY" \
            -p:CodesignProvision="$APPLE_PROVISIONING_PROFILE_NAME" \
            -p:ApplicationDisplayVersion=${{ steps.version.outputs.app_version }}

          mkdir -p ./artifacts/maccatalyst
          cp -R PolyPilot/bin/Release/net10.0-maccatalyst/PolyPilot.app ./artifacts/maccatalyst/

      - name: Re-sign with Hardened Runtime
        if: env.APPLE_CERTIFICATE_P12 != ''
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
        run: |
          APP_PATH=$(find ./artifacts/maccatalyst -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "Re-signing with hardened runtime: $APP_PATH"
            # Sign all nested dylibs/frameworks first (inside-out)
            find "$APP_PATH" -type f \( -name "*.dylib" -o -name "*.so" \) | while read f; do
              echo "  Signing: $f"
              codesign --force --options runtime --timestamp \
                --sign "$APPLE_CODESIGN_IDENTITY" "$f"
            done
            find "$APP_PATH" -type d -name "*.framework" | while read f; do
              echo "  Signing: $f"
              codesign --force --options runtime --timestamp \
                --sign "$APPLE_CODESIGN_IDENTITY" "$f"
            done
            # Sign the top-level app bundle
            codesign --force --options runtime --timestamp \
              --entitlements PolyPilot/Platforms/MacCatalyst/Entitlements.plist \
              --sign "$APPLE_CODESIGN_IDENTITY" \
              "$APP_PATH"
          fi

      - name: Publish Mac Catalyst App (Unsigned)
        if: env.APPLE_CERTIFICATE_P12 == ''
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
        run: |
          dotnet publish PolyPilot/PolyPilot.csproj \
            -f net10.0-maccatalyst \
            -c Release \
            -p:CreatePackage=false \
            -p:EnableCodeSigning=false \
            -p:ApplicationDisplayVersion=${{ steps.version.outputs.app_version }}

          mkdir -p ./artifacts/maccatalyst
          cp -R PolyPilot/bin/Release/net10.0-maccatalyst/PolyPilot.app ./artifacts/maccatalyst/

      - name: Verify code signature
        if: env.APPLE_CERTIFICATE_P12 != ''
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
        run: |
          APP_PATH=$(find ./artifacts/maccatalyst -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "Verifying signature for: $APP_PATH"
            codesign -dvv "$APP_PATH" 2>&1 | tee /tmp/codesign-output.txt

            if grep -q "flags=0x10000(runtime)" /tmp/codesign-output.txt; then
              echo "✅ Hardened Runtime is enabled"
            else
              echo "::error::Hardened Runtime is NOT enabled — notarization will fail"
              exit 1
            fi
          fi

      - name: Create ZIP archive
        run: |
          APP_PATH=$(find ./artifacts/maccatalyst -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            ditto -c -k --keepParent "$APP_PATH" ./artifacts/PolyPilot.zip
            echo "Created archive: ./artifacts/PolyPilot.zip"
            ls -lh ./artifacts/PolyPilot.zip
          else
            echo "No .app bundle found, creating archive of all artifacts"
            cd ./artifacts/maccatalyst && zip -r ../PolyPilot.zip .
          fi

      - name: Upload Mac Catalyst App
        uses: actions/upload-artifact@v7
        with:
          name: PolyPilot.app
          path: ./artifacts/PolyPilot.zip
          retention-days: 30

      - name: Set commit status with artifact link
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARTIFACT_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ -f "./artifacts/PolyPilot.zip" ]; then
            STATE="success"
            DESC="PolyPilot.app built successfully"
          else
            STATE="failure"
            DESC="PolyPilot.app build failed"
          fi
          gh api repos/${{ github.repository }}/statuses/${{ github.sha }} \
            -f state="$STATE" \
            -f target_url="$ARTIFACT_URL" \
            -f description="$DESC" \
            -f context="PolyPilot / Download App"

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          rm -f $RUNNER_TEMP/certificate.p12 $RUNNER_TEMP/profile.provisionprofile || true

  notarize-maccatalyst:
    name: Notarize Mac Catalyst App
    runs-on: macos-26
    needs: publish-maccatalyst
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Mac Catalyst artifact
        uses: actions/download-artifact@v8
        with:
          name: PolyPilot.app
          path: ./artifacts

      - name: Notarize with retry
        env:
          APPLE_NOTARIZATION_APPLE_ID: ${{ secrets.APPLE_NOTARIZATION_APPLE_ID }}
          APPLE_NOTARIZATION_PASSWORD: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
          APPLE_NOTARIZATION_TEAM_ID: ${{ secrets.APPLE_NOTARIZATION_TEAM_ID }}
        run: |
          mkdir -p ./artifacts/maccatalyst
          ditto -x -k ./artifacts/PolyPilot.zip ./artifacts/maccatalyst

          APP_PATH=$(find ./artifacts/maccatalyst -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app bundle found in artifact"
            exit 1
          fi

          ditto -c -k --keepParent "$APP_PATH" ./artifacts/notarize.zip

          MAX_RETRIES=3
          RETRY_DELAY=30
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Notarization attempt $i of $MAX_RETRIES..."
            if xcrun notarytool submit ./artifacts/notarize.zip \
              --apple-id "$APPLE_NOTARIZATION_APPLE_ID" \
              --password "$APPLE_NOTARIZATION_PASSWORD" \
              --team-id "$APPLE_NOTARIZATION_TEAM_ID" \
              --wait; then
              echo "Notarization succeeded on attempt $i"
              break
            fi
            if [ $i -lt $MAX_RETRIES ]; then
              echo "Attempt $i failed, retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
              RETRY_DELAY=$((RETRY_DELAY * 2))
            else
              echo "::error::Notarization failed after $MAX_RETRIES attempts"
              exit 1
            fi
          done

          rm ./artifacts/notarize.zip
          xcrun stapler staple "$APP_PATH"

          rm ./artifacts/PolyPilot.zip
          ditto -c -k --keepParent "$APP_PATH" ./artifacts/PolyPilot.zip
          echo "Created notarized archive"
          ls -lh ./artifacts/PolyPilot.zip

      - name: Upload notarized Mac Catalyst App
        uses: actions/upload-artifact@v7
        with:
          name: PolyPilot.app
          path: ./artifacts/PolyPilot.zip
          overwrite: true
          retention-days: 30

  publish-windows:
    name: Publish Windows App
    runs-on: windows-latest
    needs: build-test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      statuses: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Determine version
        id: version
        shell: bash
        run: |
          SHA="${GITHUB_SHA::8}"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VER="${GITHUB_REF#refs/tags/v}"
          else
            VER="1.0"
          fi
          echo "app_version=$VER" >> $GITHUB_OUTPUT
          echo "commit_sha=$SHA" >> $GITHUB_OUTPUT
          echo "Version: $VER+$SHA"

      - name: Publish Windows App
        run: |
          dotnet publish PolyPilot/PolyPilot.csproj `
            -f net10.0-windows10.0.19041.0 `
            -c Release `
            -p:WindowsPackageType=None `
            -p:ApplicationDisplayVersion=${{ steps.version.outputs.app_version }} `
            -o ./publish/windows

      - name: Create ZIP archive
        run: |
          New-Item -ItemType Directory -Force -Path ./artifacts | Out-Null
          Compress-Archive -Path ./publish/windows/* -DestinationPath ./artifacts/PolyPilot-Windows.zip
          Write-Host "Created archive: ./artifacts/PolyPilot-Windows.zip"
          Get-Item ./artifacts/PolyPilot-Windows.zip | Select-Object Name, Length

      - name: Upload Windows App
        uses: actions/upload-artifact@v7
        with:
          name: PolyPilot-Windows
          path: ./artifacts/PolyPilot-Windows.zip
          retention-days: 30

      - name: Set commit status with artifact link
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARTIFACT_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ -f "./artifacts/PolyPilot-Windows.zip" ]; then
            STATE="success"
            DESC="PolyPilot Windows built successfully"
          else
            STATE="failure"
            DESC="PolyPilot Windows build failed"
          fi
          gh api repos/${{ github.repository }}/statuses/${{ github.sha }} \
            -f state="$STATE" \
            -f target_url="$ARTIFACT_URL" \
            -f description="$DESC" \
            -f context="PolyPilot / Download Windows App"

  publish-android:
    name: Publish Android APK
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      statuses: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Install MAUI workload
        run: dotnet workload install maui-android

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'microsoft'
          java-version: '17'

      - name: Determine version
        id: version
        run: |
          SHA="${GITHUB_SHA::8}"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VER="${GITHUB_REF#refs/tags/v}"
          else
            VER="1.0"
          fi
          echo "app_version=$VER" >> $GITHUB_OUTPUT
          echo "commit_sha=$SHA" >> $GITHUB_OUTPUT
          echo "Version: $VER+$SHA"

      - name: Publish Android APK
        run: |
          dotnet publish PolyPilot/PolyPilot.csproj \
            -f net10.0-android \
            -c Release \
            -p:ApplicationDisplayVersion=${{ steps.version.outputs.app_version }}

      - name: Collect APK artifacts
        run: |
          mkdir -p ./artifacts
          find PolyPilot/bin/Release/net10.0-android -name "*-Signed.apk" -exec cp {} ./artifacts/PolyPilot-Android.apk \;
          if [ ! -f ./artifacts/PolyPilot-Android.apk ]; then
            # Fallback: look for any APK
            find PolyPilot/bin/Release/net10.0-android -name "*.apk" | head -1 | xargs -I{} cp {} ./artifacts/PolyPilot-Android.apk
          fi
          ls -lh ./artifacts/

      - name: Upload Android APK
        uses: actions/upload-artifact@v7
        with:
          name: PolyPilot-Android
          path: ./artifacts/PolyPilot-Android.apk
          retention-days: 30

      - name: Set commit status with artifact link
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARTIFACT_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ -f "./artifacts/PolyPilot-Android.apk" ]; then
            STATE="success"
            DESC="PolyPilot Android APK built successfully"
          else
            STATE="failure"
            DESC="PolyPilot Android APK build failed"
          fi
          gh api repos/${{ github.repository }}/statuses/${{ github.sha }} \
            -f state="$STATE" \
            -f target_url="$ARTIFACT_URL" \
            -f description="$DESC" \
            -f context="PolyPilot / Download Android APK"

  publish-linux:
    name: Publish Linux App (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: build-test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      statuses: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
            rid: linux-x64
          - arch: arm64
            runner: ubuntu-24.04-arm
            rid: linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Install GTK4 dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev libwebkitgtk-6.0-dev flatpak flatpak-builder

      - name: Install MAUI workload
        run: dotnet workload install maui-android

      - name: Install Flatpak runtimes
        run: |
          flatpak remote-add --if-not-exists --user flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.gnome.Platform//47 org.gnome.Sdk//47

      - name: Determine version
        id: version
        run: |
          SHA="${GITHUB_SHA::8}"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VER="${GITHUB_REF#refs/tags/v}"
          else
            VER="1.0"
          fi
          echo "app_version=$VER" >> $GITHUB_OUTPUT
          echo "commit_sha=$SHA" >> $GITHUB_OUTPUT
          echo "Version: $VER+$SHA"

      - name: Publish Linux App (${{ matrix.arch }})
        run: |
          dotnet publish PolyPilot.Gtk/PolyPilot.Gtk.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            --disable-build-servers \
            -p:UseSharedCompilation=false \
            -nodeReuse:false \
            -maxcpucount:1 \
            -p:ApplicationDisplayVersion=${{ steps.version.outputs.app_version }} \
            -p:CreateAppImage=true \
            -p:CreateDeb=true \
            -p:CreateFlatpak=true

      - name: Collect artifacts
        run: |
          mkdir -p ./artifacts

          # tar.gz archive from publish output
          PUBLISH_DIR=$(find PolyPilot.Gtk/bin/Release -type d -name publish | grep "${{ matrix.rid }}" | head -1)
          if [ -n "$PUBLISH_DIR" ]; then
            tar -czf "./artifacts/PolyPilot.${{ matrix.rid }}.tar.gz" -C "$PUBLISH_DIR" .
            echo "Created: PolyPilot.${{ matrix.rid }}.tar.gz ($(du -h ./artifacts/PolyPilot.${{ matrix.rid }}.tar.gz | cut -f1))"
          fi

          # Collect generated packages (AppImage, Deb, Flatpak)
          find PolyPilot.Gtk/bin -name "*.AppImage" -o -name "*.deb" -o -name "*.flatpak" | while read f; do
            cp "$f" "./artifacts/"
            echo "Collected: $(basename $f) ($(du -h $f | cut -f1))"
          done

          echo "=== All artifacts ==="
          ls -lh ./artifacts/

      - name: Upload Linux tar.gz
        uses: actions/upload-artifact@v7
        with:
          name: PolyPilot.${{ matrix.rid }}
          path: ./artifacts/PolyPilot.${{ matrix.rid }}.tar.gz
          retention-days: 30

      - name: Upload Linux .deb packages
        uses: actions/upload-artifact@v7
        with:
          name: PolyPilot.linux-deb-${{ matrix.arch }}
          path: ./artifacts/*.deb
          retention-days: 30

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v7
        with:
          name: PolyPilot.linux-appimage-${{ matrix.arch }}
          path: ./artifacts/*.AppImage
          retention-days: 30

      - name: Upload Linux Flatpak
        uses: actions/upload-artifact@v7
        with:
          name: PolyPilot.linux-flatpak-${{ matrix.arch }}
          path: ./artifacts/*.flatpak
          retention-days: 30

      - name: Set commit status with artifact link
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARTIFACT_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ -f "./artifacts/PolyPilot.${{ matrix.rid }}.tar.gz" ]; then
            STATE="success"
            DESC="PolyPilot Linux ${{ matrix.arch }} built successfully"
          else
            STATE="failure"
            DESC="PolyPilot Linux ${{ matrix.arch }} build failed"
          fi
          gh api repos/${{ github.repository }}/statuses/${{ github.sha }} \
            -f state="$STATE" \
            -f target_url="$ARTIFACT_URL" \
            -f description="$DESC" \
            -f context="PolyPilot / Download Linux App (${{ matrix.arch }})"

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [notarize-maccatalyst, publish-windows, publish-android]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download Mac Catalyst artifact
        uses: actions/download-artifact@v8
        with:
          name: PolyPilot.app
          path: ./release

      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: PolyPilot-Windows
          path: ./release

      - name: Download Android artifact
        uses: actions/download-artifact@v8
        with:
          name: PolyPilot-Android
          path: ./release

      - name: Download Linux tar.gz (x64)
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: PolyPilot.linux-x64
          path: ./release

      - name: Download Linux tar.gz (arm64)
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: PolyPilot.linux-arm64
          path: ./release

      - name: Download Linux .deb packages (x64)
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: PolyPilot.linux-deb-x64
          path: ./release

      - name: Download Linux .deb packages (arm64)
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: PolyPilot.linux-deb-arm64
          path: ./release

      - name: Download Linux AppImage (x64)
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: PolyPilot.linux-appimage-x64
          path: ./release

      - name: Download Linux AppImage (arm64)
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: PolyPilot.linux-appimage-arm64
          path: ./release

      - name: Download Linux Flatpak (x64)
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: PolyPilot.linux-flatpak-x64
          path: ./release

      - name: Download Linux Flatpak (arm64)
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: PolyPilot.linux-flatpak-arm64
          path: ./release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./release/PolyPilot.zip
            ./release/PolyPilot-Windows.zip
            ./release/PolyPilot-Android.apk
            ./release/PolyPilot.linux-x64.tar.gz
            ./release/PolyPilot.linux-arm64.tar.gz
            ./release/*.deb
            ./release/*.AppImage
            ./release/*.flatpak
          generate_release_notes: false
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}

      - name: Compute Mac SHA256
        id: mac_sha
        run: |
          SHA256=$(shasum -a 256 ./release/PolyPilot.zip | cut -d' ' -f1)
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT

      - name: Update Homebrew tap
        if: "!contains(github.ref, '-')"
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set, skipping"
            exit 0
          fi
          VERSION="${GITHUB_REF#refs/tags/v}"
          MAC_SHA256="${{ steps.mac_sha.outputs.sha256 }}"
          echo "{\"event_type\":\"release-published\",\"client_payload\":{\"version\":\"$VERSION\",\"mac_sha256\":\"$MAC_SHA256\"}}" | \
            gh api repos/PureWeen/homebrew-tap/dispatches --method POST --input -
